<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone YouTube Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>YT Converter V3</h1>
        <p>Fast, free, and ad-free downloads</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." autocomplete="off">
            <button id="downloadBtn">Convert</button>
        </div>
        
        <div class="options">
            <label>
                <input type="checkbox" id="audioOnly"> Audio Only (MP3)
            </label>
        </div>

        <div id="status" class="status"></div>
        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
