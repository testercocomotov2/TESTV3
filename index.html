<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGYT Downloader | V37</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="downloader-container">
        <h1>YouTube Downloader</h1>
        <p class="subtitle">Convert & Download Videos in MP4/MP3 Formats Instantly</p>

        <div class="token-box">
            <input type="password" id="ghToken" placeholder="GitHub Access Token (PAT)" onchange="saveToken()">
        </div>

        <div class="input-group">
            <input type="text" id="ytUrl" placeholder="Paste Your URL..." autocomplete="off">
        </div>

        <div class="action-bar">
            <select id="mode">
                <option value="video">MP4</option>
                <option value="audio">MP3</option>
            </select>

            <select id="quality">
                <option value="2160">4K (2160p)</option>
                <option value="1440">2K (1440p)</option>
                <option value="1080" selected>1080p</option>
                <option value="720">720p</option>
                <option value="480">480p</option>
            </select>

            <button id="startBtn" onclick="triggerAction()">Download</button>
        </div>

        <div id="downloadArea" class="download-ready">
            <a id="artifactLink" target="_blank">🚀 DOWNLOAD READY: CLICK TO SAVE</a>
        </div>

        <div id="terminal">
            <p>> SGYT Engine: System Standby...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
