<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGYT Downloader | sgyt.is-best.net</title>
    <style>
        body {
            background-color: #0d1117; color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card {
            background: #161b22; border: 1px solid #30363d; padding: 30px;
            border-radius: 12px; width: 100%; max-width: 550px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; background: #010409;
            border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: #58a6ff; }
        
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }

        button {
            width: 100%; padding: 14px; background: #238636; color: white;
            border: none; border-radius: 6px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        
        .console {
            margin-top: 25px; background: #000; padding: 15px; border-radius: 6px;
            border: 1px solid #333; font-family: monospace; font-size: 12px;
            height: 120px; overflow-y: auto; color: #3fb950;
        }
        
        #downloadArea { margin-top: 20px; text-align: center; display: none; }
        .download-btn {
            display: block; padding: 15px; background: #58a6ff;
            color: #0d1117; text-decoration: none; border-radius: 6px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>SGYT Engine V4</h1>
        
        <div class="input-group">
            <label>GitHub Access Token</label>
            <input type="password" id="ghToken" placeholder="ghp_..." onchange="saveToken()">
        </div>

        <div class="input-group">
            <label>YouTube Video Link</label>
            <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>

        <div class="options-grid">
            <div>
                <label>Mode</label>
                <select id="mode" onchange="toggleInputs()">
                    <option value="video">Video + Audio</option>
                    <option value="audio">Audio Only</option>
                </select>
            </div>
            <div id="qualityGroup">
                <label>Resolution</label>
                <select id="quality">
                    <option value="best">Best Available</option>
                    <option value="2160">4K (2160p)</option>
                    <option value="1440">2K (1440p)</option>
                    <option value="1080" selected>1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                </select>
            </div>
            <div id="audioGroup" style="display:none;">
                <label>Audio Format</label>
                <select id="audioExt">
                    <option value="mp3">MP3 (High Quality)</option>
                    <option value="m4a">M4A (Apple)</option>
                    <option value="wav">WAV (Lossless)</option>
                    <option value="opus">Opus (Web)</option>
                </select>
            </div>
        </div>

        <button id="startBtn" onclick="triggerAction()">Ignite Backend Engine</button>

        <div class="console" id="terminal">
            <p>> Ready for input, SlayerGamerYT.</p>
        </div>

        <div id="downloadArea">
            <a href="#" id="artifactLink" class="download-btn">⬇ Download Zip File</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleInputs() {
            const mode = document.getElementById('mode').value;
            document.getElementById('qualityGroup').style.display = (mode === 'video') ? 'block' : 'none';
            document.getElementById('audioGroup').style.display = (mode === 'audio') ? 'block' : 'none';
        }
    </script>
</body>
</html>
