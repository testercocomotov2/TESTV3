<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone YT Converter</title>
    
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f0f0f; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1f1f1f; 
            padding: 40px; 
            border-radius: 12px;
            width: 90%; 
            max-width: 500px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
        }
        h1 { 
            color: #ff0000; 
            margin-top: 0; 
            margin-bottom: 5px;
            font-size: 28px;
        }
        p.subtitle {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px;
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ff0000;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }
        .options label {
            cursor: pointer;
            color: #cccccc;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="radio"] {
            accent-color: #ff0000;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        button {
            width: 100%; 
            padding: 16px; 
            background: #ff0000; 
            color: white;
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { 
            background: #cc0000; 
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        #statusArea {
            margin-top: 20px;
            min-height: 24px;
            font-size: 15px;
            font-weight: bold;
        }
        #resultArea {
            margin-top: 20px;
        }
        .download-btn {
            display: inline-block; 
            width: 100%;
            padding: 16px; 
            background: #28a745; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 18px;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>YT Converter V3</h1>
        <p class="subtitle">Bypassing Authentication • Decentralized Network</p>

        <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." autocomplete="off">
        
        <div class="options">
            <label>
                <input type="radio" name="format" value="video" checked> Video (MP4)
            </label>
            <label>
                <input type="radio" name="format" value="audio"> Audio (MP3)
            </label>
        </div>

        <button id="convertBtn" onclick="startConversion()">Convert File</button>

        <div id="statusArea"></div>
        <div id="resultArea"></div>
    </div>

    <script>
        // We use an array of unlocked community servers that DO NOT require JWT passwords.
        // If one is busy, the script automatically jumps to the next one.
        const UNLOCKED_APIS = [
            "https://api.cobalt.best/",
            "https://cobalt.q-n-d.de/",
            "https://co.wuk.sh/"
        ];

        async function startConversion() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const isAudio = document.querySelector('input[name="format"][value="audio"]').checked;
            const statusEl = document.getElementById('statusArea');
            const resultEl = document.getElementById('resultArea');
            const btn = document.getElementById('convertBtn');

            // Reset UI
            resultEl.innerHTML = "";
            statusEl.innerText = "";
            
            if (!urlInput.match(/youtu\.?be/i) && !urlInput.match(/youtube\.com/i)) {
                statusEl.innerText = "Error: Please enter a valid YouTube link.";
                statusEl.style.color = "#ff4444";
                return;
            }

            btn.disabled = true;
            statusEl.innerText = "Connecting to unlocked servers...";
            statusEl.style.color = "#ffcc00";

            const payload = {
                url: urlInput,
                videoQuality: "720",
                downloadMode: isAudio ? "audio" : "auto",
                audioFormat: "mp3"
            };

            let success = false;

            // Loop through the unlocked APIs until we get a successful download link
            for (let i = 0; i < UNLOCKED_APIS.length; i++) {
                const apiUrl = UNLOCKED_APIS[i];
                statusEl.innerText = `Trying Server ${i + 1}...`;

                try {
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: {
                            "Accept": "application/json",
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) continue; // If server is busy, skip to the next one

                    const data = await response.json();

                    if (data.url) {
                        // Success!
                        statusEl.innerText = "Conversion Successful!";
                        statusEl.style.color = "#28a745";
                        
                        resultEl.innerHTML = `
                            <a href="${data.url}" class="download-btn" target="_blank">
                                ⬇ Download ${isAudio ? 'MP3' : 'MP4'}
                            </a>
                        `;
                        success = true;
                        break; // Stop the loop
                    }
                } catch (error) {
                    // Network error, simply continue to the next API in the list
                    console.warn(`Server ${apiUrl} failed.`);
                }
            }

            if (!success) {
                statusEl.innerText = "All public servers are currently busy. Try again later.";
                statusEl.style.color = "#ff4444";
            }

            btn.disabled = false;
        }

        // Allow pressing "Enter" to start
        document.getElementById('videoUrl').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                startConversion();
            }
        });
    </script>

</body>
</html>
