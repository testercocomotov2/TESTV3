name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Core Tools
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Authentication
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:player_skip_subscribe --no-check-certificates"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/dl_ready.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_ready.mp4" "${{ inputs.youtube_url }}"
          fi

      - name: Filebin Sniper Upload
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          BIN_ID=$(openssl rand -hex 6)
          
          # We use nohup and redirect to a temp file, then grep the link out.
          # This avoids the curl progress bar filling the logs and hiding the link.
          nohup curl -s -X POST --data-binary @"$FILE_PATH" "https://filebin.net/$BIN_ID/$FILENAME" > upload_log.txt 2>&1 &
          
          # Wait for upload to start, then print the clean link with a clear prefix for the JS
          echo "UPLOAD_STARTED"
          echo "SGYT_LINK: https://filebin.net/$BIN_ID/$FILENAME" | grep "filebin.net"
          
          # Wait for the background process to actually finish so we don't kill the runner too early
          wait $!

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt upload_log.txt
