name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      webhook_url:
        required: true

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Core Tools
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Media
        run: |
          mkdir output
          # Direct best quality download
          yt-dlp -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_ready.mp4" "${{ inputs.youtube_url }}"

      - name: Filebin Direct Signal Upload
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          BIN_ID=$(openssl rand -hex 6)
          LINK="https://filebin.net/$BIN_ID/$FILENAME"
          
          # 1. Perform Binary Upload
          curl -X POST --data-binary @"$FILE_PATH" "$LINK"
          
          # 2. IMMEDIATE SIGNAL: Send link to your Webhook.site token
          curl -X POST -d "$LINK" "${{ inputs.webhook_url }}"
          
          echo "SIGNAL_SUCCESS: $LINK"

      - name: Cleanup
        if: always()
        run: rm -rf output
