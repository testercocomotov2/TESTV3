name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      job_id:
        required: true

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Core Tools & Pusher
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # Flag added to bypass macOS Python security lock
          pip3 install pusher --break-system-packages

      - name: Cookie Authentication
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:player-client=tv,web --no-check-certificates"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format mp3 -o "output/dl_ready.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_ready.mp4" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to Filebin & Push Real-Time Signal
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          BIN_ID=$(openssl rand -hex 6)
          LINK="https://filebin.net/$BIN_ID/$FILENAME"
          
          # 1. Upload file
          echo "Uploading to Filebin..."
          curl -X POST --data-binary @"$FILE_PATH" "$LINK"
          
          # 2. Fire WebSocket Event directly to your frontend
          echo "Triggering Real-Time Push to Browser..."
          python3 -c "
          import pusher, os
          pusher_client = pusher.Pusher(
            app_id='2121894',
            key='5d1519712c01b0699a83',
            secret='ca874ed0cda41d8bb1ba',
            cluster='ap2',
            ssl=True
          )
          # 'job_id' is the channel, 'my-event' is the event, link is in 'message'
          pusher_client.trigger(os.environ['JOB_ID'], 'my-event', {'message': '$LINK'})
          print(f'Successfully pushed URL to frontend job: {os.environ.get(\"JOB_ID\")}')
          "

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
