name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Media
        run: |
          mkdir output
          # Download with a fixed filename to make the URL predictable
          yt-dlp -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_engine.mp4" "${{ inputs.youtube_url }}"

      - name: Private TmpFiles Upload
        run: |
          FILE_PATH="output/dl_engine.mp4"
          echo "Starting Upload to TmpFiles..."
          
          # Upload to API
          RESPONSE=$(curl -s -F "file=@$FILE_PATH" https://tmpfiles.org/api/v1/upload)
          
          # Force formatting to the /dl/ direct format
          python3 -c "
          import sys, json
          try:
              data = json.loads(sys.stdin.read())
              raw_url = data['data']['url']
              # Convert view URL to direct download URL
              dl_url = raw_url.replace('https://tmpfiles.org/', 'https://tmpfiles.org/dl/')
              print(f'\nDOWNLOAD_LINK_MARKER: {dl_url}\n')
          except:
              print('UPLOAD_FAILED')
          " <<< "$RESPONSE"

      - name: Cleanup
        if: always()
        run: rm -rf output
