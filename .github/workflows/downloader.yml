name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Link'
        required: true
        type: string
      format:
        description: 'Download Format'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg, Deno, and latest yt-dlp
        run: |
          # Install the required Deno JS engine and FFmpeg using Mac's Homebrew
          brew install ffmpeg deno
          
          # Download the absolute latest, bleeding-edge version of yt-dlp
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Media
        run: |
          mkdir output
          cd output
          
          # Advanced spoofing: Disguise the Mac as an iOS/Android device
          SPOOF_FLAGS="--extractor-args youtube:client=ios,android,tv"

          if [ "${{ inputs.format }}" == "audio" ]; then
            echo "Downloading Audio..."
            yt-dlp $SPOOF_FLAGS -x --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            echo "Downloading Video..."
            yt-dlp $SPOOF_FLAGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded_Media
          path: output/*
          retention-days: 1
