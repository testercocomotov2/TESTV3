name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      webhook_url:
        required: true

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Core Tools
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Authentication
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          # Using tv and web clients because they support cookies properly
          # This prevents the 'Sign in to confirm you are not a bot' error
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:player-client=tv,web --no-check-certificates --merge-output-format mp4"
          
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format mp3 -o "output/dl_ready.%(ext)s" "${{ inputs.youtube_url }}"
          else
            # Flexible format selection: looks for best quality up to requested resolution
            # then merges into a single mp4 file automatically
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}]+bestaudio/best[height<=${{ inputs.quality }}]/best" -o "output/dl_ready.mp4" "${{ inputs.youtube_url }}"
          fi

      - name: Filebin ASAP Upload
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          BIN_ID=$(openssl rand -hex 6)
          LINK="https://filebin.net/$BIN_ID/$FILENAME"
          
          # Binary Upload
          curl -X POST --data-binary @"$FILE_PATH" "$LINK"
          
          # IMMEDIATE SIGNAL TO WEBHOOK.SITE
          curl -X POST -d "$LINK" "${{ inputs.webhook_url }}"
          
          echo "SIGNAL_SUCCESS: $LINK"

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
