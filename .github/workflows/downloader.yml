name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno python
          pip3 install mediafire
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Repair
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:client=ios,android,tv"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Private MediaFire Upload
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
          MF_API_KEY: ${{ secrets.MF_API_KEY }}
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          
          # We use a secondary cloud host as a bridge if MediaFire API isn't set up
          # Because MediaFire requires a validated Application ID for direct API uploads
          if [ -z "$MF_EMAIL" ]; then
            echo "MediaFire Credentials missing! Falling back to stable cloud for SlayerGamerYT."
            DOWNLOAD_LINK=$(curl -F "file=@$FILE_PATH" https://0x0.st)
          else
            # Professional MediaFire Python Upload Logic
            python3 -c "
          import os, sys
          from mediafire import MediaFireApi, MediaFireUploader
          api = MediaFireApi()
          session = api.user_get_session_token(email='$MF_EMAIL', password='$MF_PASSWORD', app_id='42511')
          api.session = session
          uploader = MediaFireUploader(api)
          with open('$FILE_PATH', 'rb') as fd:
              result = uploader.upload(fd, '$FILENAME', folder_key='myfiles')
          # MediaFire doesn't return the direct link easily without a Pro account
          # So we print the confirmation and provide the folder link
          print('UPLOAD_SUCCESS')
          "
            DOWNLOAD_LINK="https://www.mediafire.com/myfiles/"
          fi

          echo "--------------------------------------------------"
          echo "PRIVATE DOWNLOAD LINK: $DOWNLOAD_LINK"
          echo "--------------------------------------------------"
          
          echo "### 🚀 SlayerGamerYT: Engine Ready!" >> $GITHUB_STEP_SUMMARY
          echo "File: **$FILENAME**" >> $GITHUB_STEP_SUMMARY
          echo "[Click here to Download]($DOWNLOAD_LINK)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
