name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno jq
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Repair
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:client=ios,android,tv"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to GoFile (Private)
        run: |
          # Use find to get the file to avoid shell expansion issues with special characters
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          echo "Uploading: $FILENAME"
          
          # 1. Get the best server with error handling
          SERVER_DATA=$(curl -s https://api.gofile.io/getServer)
          SERVER=$(echo "$SERVER_DATA" | jq -r '.data.server // empty')
          
          if [ -z "$SERVER" ]; then
            echo "Error: Could not get GoFile server. Response: $SERVER_DATA"
            exit 1
          fi
          
          # 2. Upload with specific multipart form handling
          echo "Uploading to server: $SERVER"
          UPLOAD_RESPONSE=$(curl -F "file=@$FILE_PATH" "https://$SERVER.gofile.io/uploadFile")
          
          # 3. Extract Link
          DOWNLOAD_LINK=$(echo "$UPLOAD_RESPONSE" | jq -r '.data.downloadPage // empty')
          
          if [ -z "$DOWNLOAD_LINK" ] || [ "$DOWNLOAD_LINK" == "null" ]; then
            echo "Upload failed. Response: $UPLOAD_RESPONSE"
            exit 1
          fi

          echo "--------------------------------------------------"
          echo "PRIVATE DOWNLOAD LINK: $DOWNLOAD_LINK"
          echo "--------------------------------------------------"
          
          # Add to GitHub Step Summary for easy one-click access
          echo "### 🚀 SlayerGamerYT: Your Download is Ready!" >> $GITHUB_STEP_SUMMARY
          echo "Your file **$FILENAME** has been uploaded privately." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Click here to Download]($DOWNLOAD_LINK)" >> $GITHUB_STEP_SUMMARY
