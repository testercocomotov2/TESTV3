name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Link'
        required: true
        type: string
      format:
        description: 'Download Format'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg, Deno, and latest yt-dlp
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Sanitize and Load Cookies
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          # 1. Write the raw secret to a file
          echo "$YT_COOKIES_SECRET" > raw_cookies.txt
          
          # 2. Strip Android/Windows line breaks to make it Unix compatible
          tr -d '\r' < raw_cookies.txt > fixed_cookies.txt
          
          # 3. Force the Netscape header if it is missing
          if ! head -n 1 fixed_cookies.txt | grep -q "# Netscape HTTP Cookie File"; then
            echo "# Netscape HTTP Cookie File" > final_cookies.txt
            cat fixed_cookies.txt >> final_cookies.txt
          else
            cp fixed_cookies.txt final_cookies.txt
          fi

      - name: Download Media
        run: |
          mkdir output
          cd output
          
          # Pass the perfectly formatted cookie file and client spoofing
          SPOOF_FLAGS="--cookies ../final_cookies.txt --extractor-args youtube:client=ios,android,tv"

          if [ "${{ inputs.format }}" == "audio" ]; then
            echo "Downloading Audio..."
            yt-dlp $SPOOF_FLAGS -x --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            echo "Downloading Video..."
            yt-dlp $SPOOF_FLAGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded_Media
          path: output/*
          retention-days: 1
          
