name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Media
        run: |
          mkdir output
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp -x --audio-format ${{ inputs.audio_ext }} -o "output/dl_engine.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_engine.mp4" "${{ inputs.youtube_url }}"
          fi

      - name: Private TmpFiles Upload
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          
          # Upload and convert to Direct Download format
          RESPONSE=$(curl -s -F "file=@$FILE_PATH" https://tmpfiles.org/api/v1/upload)
          
          python3 -c "
          import sys, json
          try:
              data = json.loads(sys.stdin.read())
              url = data['data']['url']
              # Format to: https://tmpfiles.org/dl/ID/filename
              dl_url = url.replace('https://tmpfiles.org/', 'https://tmpfiles.org/dl/') + '/$FILENAME'
              print(f'\n\nSUCCESS_LINK: {dl_url}\n\n')
          except:
              print('UPLOAD_FAILED')
          " <<< "$RESPONSE"

      - name: Cleanup
        if: always()
        run: rm -rf output
