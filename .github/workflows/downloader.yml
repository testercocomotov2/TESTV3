name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Link'
        required: true
        type: string
      format:
        description: 'Download Format'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download_and_convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg, Node.js, and yt-dlp
        run: |
          sudo apt-get update
          # We install nodejs so yt-dlp can solve YouTube's anti-bot math puzzles
          sudo apt-get install -y ffmpeg nodejs
          python3 -m pip install -U yt-dlp

      - name: Download Media
        run: |
          mkdir output
          cd output
          
          # ANTI-BOT SPOOFING: We tell YouTube we are an Android device, not a server.
          SPOOF_FLAGS="--extractor-args youtube:client=android,tv,web"

          if [ "${{ inputs.format }}" == "audio" ]; then
            echo "Downloading Audio..."
            yt-dlp $SPOOF_FLAGS -x --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            echo "Downloading Video..."
            yt-dlp $SPOOF_FLAGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded_Media
          path: output/*
          retention-days: 1
