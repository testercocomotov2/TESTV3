name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno
          pip3 install mediafire --break-system-packages
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Repair
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:client=ios,android,tv"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Triple-Cloud Private Upload
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          
          echo "### 🚀 SlayerGamerYT: Engine Summary" >> $GITHUB_STEP_SUMMARY
          echo "File: **$FILENAME**" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          # 1. PixelDrain Upload (Fixed to handle API response better)
          echo "Uploading to PixelDrain..."
          PD_RESPONSE=$(curl -s -T "$FILE_PATH" https://pixeldrain.com/api/file/)
          PD_URL=$(echo "$PD_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print('https://pixeldrain.com/u/'+data['id']) if 'id' in data else print('Failed')" || echo "Failed")
          echo "PixelDrain: $PD_URL"
          echo "* **PixelDrain:** $PD_URL" >> $GITHUB_STEP_SUMMARY

          # 2. File.io Upload (Added retry/delay)
          echo "Uploading to File.io..."
          sleep 2
          FIO_RESPONSE=$(curl -s -F "file=@$FILE_PATH" https://file.io)
          FIO_URL=$(echo "$FIO_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('link', 'Failed')) if isinstance(data, dict) else print('Failed')" || echo "Failed")
          echo "File.io: $FIO_URL"
          echo "* **File.io:** $FIO_URL (One-time use)" >> $GITHUB_STEP_SUMMARY

          # 3. MediaFire Upload (Optional Secrets)
          if [ -n "$MF_EMAIL" ] && [ -n "$MF_PASSWORD" ]; then
            echo "Uploading to MediaFire..."
            MF_STATUS=$(python3 -c "
          import sys
          from mediafire import MediaFireApi, MediaFireUploader
          try:
              api = MediaFireApi()
              session = api.user_get_session_token(email='$MF_EMAIL', password='$MF_PASSWORD', app_id='42511')
              api.session = session
              uploader = MediaFireUploader(api)
              with open('$FILE_PATH', 'rb') as fd:
                  uploader.upload(fd, '$FILENAME')
              print('SUCCESS')
          except Exception as e:
              print(f'FAILED:{e}')
          ")
            if [ "$MF_STATUS" == "SUCCESS" ]; then
              echo "* **MediaFire:** [Check MyFiles](https://www.mediafire.com/myfiles/)" >> $GITHUB_STEP_SUMMARY
            else
              echo "MediaFire Failed: $MF_STATUS"
            fi
          fi

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
