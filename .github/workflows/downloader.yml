name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Link'
        required: true
        type: string
      format:
        description: 'Download Format'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg, Deno, and latest yt-dlp
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Repair Android Clipboard Cookies
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          # Write the raw secret from GitHub into a temporary file
          echo "$YT_COOKIES_SECRET" > raw_cookies.txt
          
          # Run a mini Python script to convert Android spaces back into Netscape Tabs
          python3 -c "
          with open('raw_cookies.txt', 'r') as f:
              lines = f.readlines()
          
          with open('final_cookies.txt', 'w') as f:
              f.write('# Netscape HTTP Cookie File\n')
              for line in lines:
                  line = line.strip()
                  # Skip empty lines or existing headers
                  if not line or line.startswith('#'): 
                      continue
                  # Split the line by spaces into exactly 7 columns
                  parts = line.split(None, 6)
                  # Rejoin the columns using real Tab characters
                  if len(parts) == 7:
                      f.write('\t'.join(parts) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          cd output
          
          # Pass the repaired cookie file
          SPOOF_FLAGS="--cookies ../final_cookies.txt --extractor-args youtube:client=ios,android,tv"

          if [ "${{ inputs.format }}" == "audio" ]; then
            echo "Downloading Audio..."
            yt-dlp $SPOOF_FLAGS -x --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            echo "Downloading Video..."
            yt-dlp $SPOOF_FLAGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded_Media
          path: output/*
          retention-days: 1
