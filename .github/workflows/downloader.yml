name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Repair
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:client=ios,android,tv"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Secure CLI Upload
        run: |
          # Rename to avoid bold/italic characters breaking the upload URL
          ORIGINAL_PATH=$(find output -type f | head -n 1)
          EXTENSION="${ORIGINAL_PATH##*.}"
          SAFE_PATH="output/secure_dl.$EXTENSION"
          mv "$ORIGINAL_PATH" "$SAFE_PATH"

          echo "Uploading to bashupload.com..."

          # Upload using the binary stream method (-T)
          # BashUpload returns the link as a plain text response
          LINK=$(curl -s -T "$SAFE_PATH" "https://bashupload.com/secure_dl.$EXTENSION")

          if [[ $LINK == http* ]]; then
             echo "--------------------------------------------------"
             echo "DOWNLOAD_LINK: $LINK"
             echo "--------------------------------------------------"
          else
             echo "BashUpload failed. Trying fallback to 0x0.st..."
             LINK_FALLBACK=$(curl -s -F "file=@$SAFE_PATH" https://0x0.st)
             echo "DOWNLOAD_LINK: $LINK_FALLBACK"
          fi

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
