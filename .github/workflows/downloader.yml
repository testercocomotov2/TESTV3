name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Authentication
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:player_skip_subscribe --no-check-certificates"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/dl_engine.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/dl_engine.mp4" "${{ inputs.youtube_url }}"
          fi

      - name: Private Multi-Upload Sniper
        run: |
          FILE_PATH=$(find output -type f | head -n 1)
          FILENAME=$(basename "$FILE_PATH")
          
          # Try PixelDrain (Most stable)
          PD_RES=$(curl -s -T "$FILE_PATH" https://pixeldrain.com/api/file/)
          PD_ID=$(echo "$PD_RES" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id', ''))")
          
          if [ -n "$PD_ID" ]; then
             echo "SGYT_LINK: https://pixeldrain.com/u/$PD_ID"
          else
             # Fallback to TmpFiles if PixelDrain fails
             TMP_RES=$(curl -s -F "file=@$FILE_PATH" https://tmpfiles.org/api/v1/upload)
             python3 -c "
             import sys, json
             data = json.loads(sys.stdin.read())
             print(f\"SGYT_LINK: {data['data']['url'].replace('tmpfiles.org/', 'tmpfiles.org/dl/')}/$FILENAME\")
             " <<< "$TMP_RES"
          fi

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
