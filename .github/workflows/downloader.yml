name: YT Downloader Engine

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        required: true
      format:
        default: 'video'
      quality:
        default: '1080'
      audio_ext:
        default: 'mp3'

jobs:
  download_and_convert:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install ffmpeg deno
          pip3 install mediafire --break-system-packages
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cookie Repair
        env:
          YT_COOKIES_SECRET: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES_SECRET" > raw.txt
          python3 -c "
          import os
          if os.path.exists('raw.txt'):
              with open('raw.txt', 'r') as f, open('final_cookies.txt', 'w') as out:
                  out.write('# Netscape HTTP Cookie File\n')
                  for line in f:
                      p = line.strip().split()
                      if len(p) == 7: out.write('\t'.join(p) + '\n')
          "

      - name: Download Media
        run: |
          mkdir output
          FLAGS="--cookies final_cookies.txt --extractor-args youtube:client=ios,android,tv"
          if [ "${{ inputs.format }}" == "audio" ]; then
            yt-dlp $FLAGS -x --audio-format ${{ inputs.audio_ext }} -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          else
            yt-dlp $FLAGS -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best" -o "output/%(title)s.%(ext)s" "${{ inputs.youtube_url }}"
          fi

      - name: Multi-Cloud Private Upload
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
        run: |
          # 1. Rename file for clean upload
          ORIGINAL_PATH=$(find output -type f | head -n 1)
          EXTENSION="${ORIGINAL_PATH##*.}"
          SAFE_PATH="output/download_ready.$EXTENSION"
          mv "$ORIGINAL_PATH" "$SAFE_PATH"

          # 2. PixelDrain Upload
          echo "Uploading to PixelDrain..."
          PD_RESPONSE=$(curl -s -T "$SAFE_PATH" "https://pixeldrain.com/api/file/download_ready.$EXTENSION")
          PD_ID=$(echo "$PD_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('id', ''))" || echo "")
          if [ -n "$PD_ID" ]; then
             echo "LINK_READY_PD: https://pixeldrain.com/u/$PD_ID"
          fi

          # 3. File.io Upload
          echo "Uploading to File.io..."
          FIO_RESPONSE=$(curl -s -F "file=@$SAFE_PATH" https://file.io)
          FIO_URL=$(echo "$FIO_RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('link', ''))" || echo "")
          if [ -n "$FIO_URL" ]; then
             echo "LINK_READY_FIO: $FIO_URL"
          fi

      - name: Cleanup
        if: always()
        run: rm -rf output raw.txt final_cookies.txt
